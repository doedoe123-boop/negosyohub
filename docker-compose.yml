services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/negosyo-hub:latest
    container_name: laravel_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: marketplace
      DB_USERNAME: laravel
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: marketplace_db
    restart: always
    environment:
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: marketplace
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U laravel -d marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  queue:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/negosyo-hub:latest
    container_name: laravel_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3"]
    environment:
      # ... copy environment from 'app'
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/negosyo-hub:latest
    container_name: laravel_scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    environment:
      # ... copy environment from 'app'
      DB_PASSWORD: ${DB_PASSWORD}
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine 
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "80:80" 
    volumes:
      # In prod, we only mount the Nginx config. 
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app-network

volumes:
  dbdata:

networks:
  app-network: