name: Production Deploy

on:
  workflow_run:
    workflows: ["Laravel CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            export DEPLOY_BRANCH=main
            export BUILD_FRONTEND=${{ vars.BUILD_FRONTEND || 'true' }}
            export RELOAD_SERVICES=${{ vars.RELOAD_SERVICES || 'true' }}
            export PHP_BINARY=${{ vars.PHP_BINARY || 'php' }}
            export COMPOSER_BIN=${{ vars.COMPOSER_BIN || 'composer' }}
            export NPM_BIN=${{ vars.NPM_BIN || 'npm' }}
            cd "${{ vars.PROD_APP_PATH }}"
            bash ./deploy-production.sh
